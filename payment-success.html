<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна! ✅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .success-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .success-icon svg { width: 40px; height: 40px; fill: white; }
        h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
        .payment-details {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .detail-row:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            font-weight: bold;
            font-size: 16px;
        }
        .detail-label { color: #666; }
        .detail-value { color: #333; font-weight: 500; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-secondary { background: #f5f5f5; color: #333; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <h1>Оплата успешна! ✅</h1>
        <p class="subtitle">Спасибо за оплату. Юлия скоро свяжется с вами.</p>
        <div class="payment-details">
            <div class="detail-row">
                <span class="detail-label">Услуга:</span>
                <span class="detail-value" id="serviceName">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">ID платежа:</span>
                <span class="detail-value" id="paymentId">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Сумма:</span>
                <span class="detail-value" id="amount">-</span>
            </div>
        </div>
        <button class="btn" onclick="window.close()">Закрыть</button>
        <button class="btn btn-secondary" onclick="location.href='/'">Вернуться назад</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('paymentId').textContent = urlParams.get('payment_id') || '-';
        document.getElementById('amount').textContent = urlParams.get('amount') ? `${urlParams.get('amount')} ₽` : '-';
        document.getElementById('serviceName').textContent = decodeURIComponent(urlParams.get('service') || '-');

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.sendData(JSON.stringify({
                type: 'payment_success',
                payment_id: urlParams.get('payment_id'),
                amount: urlParams.get('amount'),
                service: urlParams.get('service')
            }));
        }
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
