<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Юлия — Психолог • Сексолог</title>
  <meta name="description" content="Юлия — психолог, сексолог, телесно-ориентированный терапевт. Более 7 лет практики." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ivory: #F7F3EE;
      --clay: #B87B5C;
      --clay-light: #D4A88C;
      --terracotta: #C4705A;
      --sage: #7A8B73;
      --sage-light: #A8B5A0;
      --ink: #2D2926;
      --stone: #6B6560;
      --mist: #9B9590;
      --parchment: #EDE8E1;
      --warm-white: #FAF8F5;
      --blush: #E8D5C4;
      --wine: #722F37;
      --wine-hover: #8B3A44;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--ivory);
      color: var(--ink);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .font-serif {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
    }

    /* Header */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: 72px; display: flex; align-items: center;
      background: transparent;
      transition: background 0.5s, backdrop-filter 0.5s;
    }
    .header.scrolled {
      background: rgba(247,243,238,0.85);
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 20px rgba(45,41,38,0.04);
    }
    .header-inner {
      width: 100%; max-width: 1200px; margin: 0 auto;
      padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 1.15rem; color: var(--ink); text-decoration: none; letter-spacing: 0.02em; }
    .nav-links { display: none; gap: 32px; }
    .nav-links a { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; color: var(--stone); text-decoration: none; position: relative; transition: color 0.3s; }
    .nav-links a::after { content: ''; position: absolute; left: 0; bottom: -4px; width: 0; height: 1px; background: var(--clay); transition: width 0.3s; }
    .nav-links a:hover { color: var(--clay); }
    .nav-links a:hover::after { width: 100%; }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--wine); color: white;
      font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 0.95rem;
      padding: 14px 36px; border-radius: 40px; border: none; cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(114,47,55,0.2);
      transition: background 0.4s, transform 0.3s, box-shadow 0.3s;
    }
    .btn-primary:hover { background: var(--wine-hover); transform: translateY(-2px); }
    .btn-outline {
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; color: var(--clay); border: 1.5px solid var(--clay);
      font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 0.95rem;
      padding: 14px 32px; border-radius: 40px; cursor: pointer;
      transition: all 0.4s;
    }
    .btn-outline:hover { background: var(--clay); color: white; }
    .btn-header { padding: 12px 28px; font-size: 0.9rem; }

    /* Hero */
    .hero { min-height: 100dvh; display: flex; align-items: center; position: relative; overflow: hidden; padding-top: 72px; }
    .blob { position: absolute; border-radius: 60% 40% 55% 45% / 45% 55% 40% 60%; pointer-events: none; }
    .hero-inner { width: 100%; max-width: 1200px; margin: 0 auto; padding: 48px 24px; display: grid; grid-template-columns: 1fr; gap: 48px; align-items: center; position: relative; z-index: 2; }
    .hero-label { font-size: 0.9rem; font-weight: 300; color: var(--mist); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 24px; }
    .hero h1 { font-size: clamp(3rem, 8vw, 6rem); line-height: 1; color: var(--ink); margin-bottom: 24px; }
    .hero-exp { font-size: 1.1rem; font-weight: 300; color: var(--stone); margin-bottom: 24px; }
    .hero-desc { font-size: 1.05rem; font-weight: 300; color: var(--stone); line-height: 1.7; max-width: 440px; margin-bottom: 32px; }
    .hero-img-wrap { display: flex; justify-content: center; }
    .hero-img {
      width: min(70vw, 420px); overflow: hidden;
      border-radius: 40% 60% 55% 45% / 55% 45% 60% 40%;
    }
    .hero-img img { width: 100%; height: auto; object-fit: cover; display: block; }

    /* Sections */
    .section { padding: 80px 24px; }
    .section-alt { background: var(--warm-white); }
    .section-inner { max-width: 1080px; margin: 0 auto; }
    .section h2 { font-size: clamp(2rem, 5vw, 3.5rem); text-align: center; color: var(--ink); margin-bottom: 12px; }
    .section-subtitle { font-size: 1rem; font-weight: 300; color: var(--mist); text-align: center; margin-bottom: 48px; }

    /* About */
    .about-grid { display: grid; grid-template-columns: 1fr; gap: 48px; align-items: center; }
    .about-img { width: min(80vw, 420px); margin: 0 auto; overflow: hidden; border-radius: 60% 40% 55% 45% / 45% 55% 40% 60%; }
    .about-img img { width: 100%; height: auto; display: block; }
    .about-text p { font-size: 1.05rem; font-weight: 300; color: var(--stone); line-height: 1.8; margin-bottom: 24px; }

    /* Services */
    .services-grid { display: grid; grid-template-columns: 1fr; gap: 32px; }
    .service-card {
      background: var(--parchment); border-radius: 32px; padding: 40px 32px;
      transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.5s;
    }
    .service-card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(45,41,38,0.08); }
    .service-num { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--clay-light); opacity: 0.4; line-height: 1; margin-bottom: 16px; }
    .service-card h3 { font-size: clamp(1.3rem, 3vw, 1.8rem); color: var(--ink); margin-bottom: 12px; }
    .service-price { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--clay); margin-bottom: 16px; }
    .service-price span { font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 300; color: var(--mist); }
    .service-divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--clay-light) 50%, transparent); margin-bottom: 16px; }
    .service-card p { font-size: 0.95rem; font-weight: 300; color: var(--stone); line-height: 1.7; margin-bottom: 12px; }
    .service-dur { font-size: 0.85rem; color: var(--mist); margin-bottom: 20px; }

    /* Testimonials */
    .testimonials-section { background: var(--parchment); }
    .testimonials-grid { display: grid; grid-template-columns: 1fr; gap: 28px; }
    .testimonial-card {
      background: var(--warm-white); border: 1px solid var(--parchment); border-radius: 28px; padding: 32px;
      transition: transform 0.4s, box-shadow 0.4s;
    }
    .testimonial-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(45,41,38,0.06); }
    .testimonial-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .testimonial-avatar { width: 56px; height: 56px; border-radius: 50%; overflow: hidden; border: 2px solid var(--clay-light); flex-shrink: 0; }
    .testimonial-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .testimonial-name { font-size: 0.95rem; font-weight: 400; color: var(--ink); }
    .testimonial-role { font-size: 0.85rem; font-weight: 300; color: var(--mist); }
    .stars { display: flex; gap: 4px; margin-bottom: 16px; }
    .star { fill: var(--clay-light); color: var(--clay-light); }
    .testimonial-text { font-size: 0.95rem; font-weight: 300; color: var(--stone); line-height: 1.7; }

    /* Contact */
    .contact-section { background: var(--ivory); }
    .contact-form-wrap { background: var(--warm-white); border-radius: 32px; padding: 40px 32px; max-width: 560px; margin: 0 auto; box-shadow: 0 8px 40px rgba(45,41,38,0.04); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 400; color: var(--stone); margin-bottom: 8px; }
    .form-group input, .form-group textarea {
      width: 100%; background: var(--blush); border: 1.5px solid transparent; border-radius: 16px;
      padding: 16px 20px; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 300; color: var(--ink);
      outline: none; transition: border 0.3s, box-shadow 0.3s;
    }
    .form-group input::placeholder, .form-group textarea::placeholder { color: var(--mist); }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--clay); box-shadow: 0 0 0 4px rgba(184,123,92,0.1); }
    .form-group textarea { resize: none; min-height: 100px; }
    .contact-info { text-align: center; margin-top: 48px; }
    .contact-info a { display: block; font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; color: var(--ink); text-decoration: none; margin-bottom: 16px; transition: color 0.3s; }
    .contact-info a:hover { color: var(--clay); }
    .messengers { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 16px; }
    .messengers a { display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 300; color: var(--stone); transition: color 0.3s; }
    .messengers a:hover { color: var(--clay); }
    .contact-email { font-size: 0.9rem; font-weight: 300; color: var(--mist); text-decoration: none; transition: color 0.3s; }
    .contact-email:hover { color: var(--stone); }
    .contact-loc { font-size: 0.85rem; font-weight: 300; color: var(--mist); }

    /* Footer */
    .footer { background: var(--ink); padding: 48px 24px; }
    .footer-divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--clay) 50%, transparent); opacity: 0.3; margin-bottom: 48px; }
    .footer-inner { max-width: 1080px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 24px; text-align: center; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--parchment); }
    .footer-sub { font-size: 0.8rem; font-weight: 300; color: var(--mist); }
    .footer-nav { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .footer-nav a { font-size: 0.85rem; font-weight: 300; color: var(--mist); text-decoration: none; transition: color 0.3s; }
    .footer-nav a:hover { color: var(--parchment); }
    .footer-admin { font-size: 0.8rem; color: var(--clay-light); text-decoration: none; transition: color 0.3s; border: 1px solid var(--clay-light); padding: 4px 12px; border-radius: 20px; }
    .footer-admin:hover { color: var(--parchment); border-color: var(--parchment); }
    .footer-copy { font-size: 0.8rem; font-weight: 300; color: var(--mist); }

    /* Admin link */
    .admin-link { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: var(--wine); color: white; padding: 8px 16px; border-radius: 20px; font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; text-decoration: none; opacity: 0.6; transition: opacity 0.3s; }
    .admin-link:hover { opacity: 1; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes clipReveal {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0% 0 0); }
    }
    .anim-fade-up { opacity: 0; }
    .anim-fade-up.visible { animation: fadeUp 1s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .anim-clip { clip-path: inset(0 100% 0 0); }
    .anim-clip.visible { animation: clipReveal 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

    /* Mobile menu */
    .menu-btn { display: block; background: none; border: none; cursor: pointer; padding: 8px; }
    .menu-overlay { position: fixed; inset: 0; background: rgba(247,243,238,0.98); backdrop-filter: blur(16px); z-index: 60; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    .menu-overlay.open { opacity: 1; pointer-events: auto; }
    .menu-overlay a { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--ink); text-decoration: none; }
    .menu-close { position: absolute; top: 20px; right: 20px; background: none; border: none; cursor: pointer; font-size: 1.5rem; color: var(--ink); }

    /* Desktop */
    @media (min-width: 768px) {
      .hero-inner { grid-template-columns: 1fr 1fr; gap: 64px; padding: 0 48px; }
      .hero-img { width: min(50vw, 480px); }
      .about-grid { grid-template-columns: 1fr 1.2fr; gap: 64px; }
      .about-img { margin: 0; width: 100%; max-width: 420px; }
      .services-grid { grid-template-columns: repeat(3, 1fr); }
      .testimonials-grid { grid-template-columns: repeat(3, 1fr); }
      .section { padding: 120px 48px; }
      .footer-inner { flex-direction: row; justify-content: space-between; text-align: left; }
      .nav-links { display: flex; }
      .menu-btn { display: none; }
      .header-inner { padding: 0 48px; }
      .contact-form-wrap { padding: 48px 40px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header" id="header">
  <div class="header-inner">
    <a href="#" class="logo">Юлия</a>
    <nav class="nav-links">
      <a href="#services">Направления</a>
      <a href="#testimonials">Отзывы</a>
      <a href="#contact">Контакты</a>
      <a href="admin.html" style="color:var(--clay);">Admin</a>
    </nav>
    <div style="display:flex;align-items:center;gap:16px;">
      <a href="#contact" class="btn-primary btn-header" style="display:none;" id="header-btn">Записаться</a>
      <button class="menu-btn" id="menu-btn" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- Mobile Menu -->
<div class="menu-overlay" id="menu-overlay">
  <button class="menu-close" id="menu-close">&times;</button>
  <a href="#services" class="menu-link">Направления</a>
  <a href="#testimonials" class="menu-link">Отзывы</a>
  <a href="#contact" class="menu-link">Контакты</a>
  <a href="admin.html" class="menu-link" style="color:var(--clay);">Панель управления</a>
</div>

<!-- Main Content -->
<main id="app">
  <p style="text-align:center;padding:100px 24px;color:var(--stone);">Загрузка...</p>
</main>

<!-- Admin Link -->
<a href="admin.html" class="admin-link">Admin</a>

<script>
// Load data and render
fetch('data.json')
  .then(r => r.json())
  .then(data => render(data))
  .catch(() => document.getElementById('app').innerHTML = '<p style="text-align:center;padding:100px;">Ошибка загрузки данных</p>');

function render(d) {
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderHero(d.hero)}
    ${renderAbout(d.about)}
    ${renderServices(d.services)}
    ${renderTestimonials(d.testimonials)}
    ${renderContact(d.contact)}
    ${renderFooter()}
  `;
  initAnimations();
}

function renderHero(h) {
  return `
    <section class="hero" style="background:var(--ivory);">
      <div class="blob" style="top:15%;left:5%;width:280px;height:280px;background:var(--clay-light);opacity:0.1;"></div>
      <div class="blob" style="bottom:10%;right:8%;width:220px;height:220px;background:var(--sage-light);opacity:0.1;border-radius:40% 60% 45% 55%/55% 45% 60% 40%;"></div>
      <div class="hero-inner">
        <div style="order:2;">
          <p class="hero-label anim-fade-up">${h.subtitle}</p>
          <h1 class="anim-clip">${h.title}</h1>
          <p class="hero-exp anim-fade-up">${h.experience}</p>
          <p class="hero-desc anim-fade-up">${h.description}</p>
          <a href="#contact" class="btn-primary anim-fade-up">Записаться на консультацию</a>
        </div>
        <div class="hero-img-wrap" style="order:1;">
          <div class="hero-img anim-fade-up">
            <img src="julia-hero.jpg" alt="Юлия — психолог" />
          </div>
        </div>
      </div>
    </section>
  `;
}

function renderAbout(a) {
  return `
    <section class="section section-alt">
      <div class="section-inner">
        <h2 class="anim-clip">${a.title}</h2>
        <div class="about-grid" style="margin-top:64px;">
          <div class="about-img anim-fade-up">
            <img src="julia-about.jpg" alt="Юлия в кабинете" />
          </div>
          <div class="about-text">
            ${a.paragraphs.map((p, i) => `<p class="anim-fade-up" style="animation-delay:${i * 0.15}s">${p}</p>`).join('')}
          </div>
        </div>
      </div>
    </section>
  `;
}

function renderServices(s) {
  return `
    <section class="section" id="services" style="background:var(--ivory);">
      <div class="section-inner">
        <h2 class="anim-clip">${s.title}</h2>
        <p class="section-subtitle anim-fade-up">${s.subtitle}</p>
        <div class="services-grid" style="margin-top:48px;">
          ${s.items.map((svc, i) => `
            <div class="service-card anim-fade-up" style="animation-delay:${i * 0.2}s">
              <span class="service-num">${svc.number}</span>
              <h3>${svc.title}</h3>
              <p class="service-price">${svc.price} <span>/ сессия</span></p>
              <div class="service-divider"></div>
              <p>${svc.description}</p>
              <p class="service-dur">${svc.duration}</p>
              <a href="#contact" class="btn-outline" style="width:100%;font-size:0.9rem;padding:12px 24px;">Записаться</a>
            </div>
          `).join('')}
        </div>
      </div>
    </section>
  `;
}

function renderTestimonials(t) {
  return `
    <section class="section testimonials-section" id="testimonials">
      <div class="section-inner">
        <h2 class="anim-clip">${t.title}</h2>
        <p class="section-subtitle anim-fade-up">${t.subtitle}</p>
        <div class="testimonials-grid" style="margin-top:48px;">
          ${t.items.map((item, i) => `
            <div class="testimonial-card anim-fade-up" style="animation-delay:${i * 0.15}s">
              <div class="testimonial-header">
                <div class="testimonial-avatar">
                  <img src="${item.avatar}" alt="${item.name}" />
                </div>
                <div>
                  <p class="testimonial-name">${item.name}${item.age ? ', ' + item.age : ''}</p>
                  <p class="testimonial-role">${item.role}</p>
                </div>
              </div>
              <div class="stars">
                ${Array(item.rating).fill('<svg class="star" width="14" height="14" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>').join('')}
              </div>
              <p class="testimonial-text">${item.text}</p>
            </div>
          `).join('')}
        </div>
      </div>
    </section>
  `;
}

function renderContact(c) {
  return `
    <section class="section contact-section" id="contact">
      <div class="section-inner">
        <h2 class="anim-clip">${c.title}</h2>
        <p class="section-subtitle anim-fade-up">${c.subtitle}</p>
        <div class="contact-form-wrap anim-fade-up">
          <form id="contact-form">
            <div class="form-group">
              <label>Ваше имя</label>
              <input type="text" placeholder="Как к вам обращаться" required />
            </div>
            <div class="form-group">
              <label>Телефон или Telegram</label>
              <input type="text" placeholder="+7 (___) ___-__-__" required />
            </div>
            <div class="form-group">
              <label>О чём хотели бы поговорить?</label>
              <textarea rows="4" placeholder="Кратко опишите ваш запрос..."></textarea>
            </div>
            <button type="submit" class="btn-primary" style="width:100%;">Отправить заявку</button>
          </form>
        </div>
        <div class="contact-info">
          <a href="tel:${c.phone.replace(/\s/g, '')}">${c.phone}</a>
          <div class="messengers">
            <a href="${c.whatsapp}" target="_blank" rel="noopener">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              WhatsApp
            </a>
            <a href="${c.telegram}" target="_blank" rel="noopener">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Telegram
            </a>
          </div>
          <a href="mailto:${c.email}" class="contact-email">${c.email}</a>
          <p class="contact-loc">${c.location}</p>
        </div>
      </div>
    </section>
  `;
}

function renderFooter() {
  return `
    <footer class="footer">
      <div class="footer-divider"></div>
      <div class="footer-inner">
        <div>
          <p class="footer-logo">Юлия</p>

// Intersection Observer for animations
function initAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

  document.querySelectorAll('.anim-fade-up, .anim-clip').forEach(el => observer.observe(el));

  // Header scroll
  const header = document.getElementById('header');
  const headerBtn = document.getElementById('header-btn');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      header.classList.add('scrolled');
      if (window.innerWidth >= 768) headerBtn.style.display = 'inline-flex';
    } else {
      header.classList.remove('scrolled');
      headerBtn.style.display = 'none';
    }
  }, { passive: true });

  // Mobile menu
  const menuBtn = document.getElementById('menu-btn');
  const menuOverlay = document.getElementById('menu-overlay');
  const menuClose = document.getElementById('menu-close');
  menuBtn.addEventListener('click', () => menuOverlay.classList.add('open'));
  menuClose.addEventListener('click', () => menuOverlay.classList.remove('open'));
  document.querySelectorAll('.menu-link').forEach(l => l.addEventListener('click', () => menuOverlay.classList.remove('open')));

  // Smooth scroll
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      const id = a.getAttribute('href');
      if (id === '#') return;
      e.preventDefault();
      document.querySelector(id)?.scrollIntoView({ behavior: 'smooth' });
    });
  });
