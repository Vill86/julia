<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Юлия — Психолог • Сексолог</title>
<meta name="description" content="Юлия — психолог, сексолог, телесно-ориентированный терапевт. Более 7 лет практики." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{--ivory:#F7F3EE;--clay:#B87B5C;--clay-light:#D4A88C;--terracotta:#C4705A;--sage:#7A8B73;--sage-light:#A8B5A0;--ink:#2D2926;--stone:#6B6560;--mist:#9B9590;--parchment:#EDE8E1;--warm-white:#FAF8F5;--blush:#E8D5C4;--wine:#722F37;--wine-hover:#8B3A44;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--ivory);color:var(--ink);overflow-x:hidden;-webkit-font-smoothing:antialiased}
h1,h2,h3,.font-serif{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400}
.header{position:fixed;top:0;left:0;right:0;z-index:50;height:72px;display:flex;align-items:center;background:transparent;transition:background .5s,backdrop-filter .5s}
.header.scrolled{background:rgba(247,243,238,.85);backdrop-filter:blur(16px);box-shadow:0 4px 20px rgba(45,41,38,.04)}
.header-inner{width:100%;max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.15rem;color:var(--ink);text-decoration:none;letter-spacing:.02em}
.nav-links{display:none;gap:32px}
.nav-links a{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--stone);text-decoration:none;position:relative;transition:color .3s}
.nav-links a::after{content:'';position:absolute;left:0;bottom:-4px;width:0;height:1px;background:var(--clay);transition:width .3s}
.nav-links a:hover{color:var(--clay)}.nav-links a:hover::after{width:100%}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;background:var(--wine);color:white;font-family:'Cormorant Garamond',serif;font-weight:500;font-size:.95rem;padding:14px 36px;border-radius:40px;border:none;cursor:pointer;text-decoration:none;box-shadow:0 4px 20px rgba(114,47,55,.2);transition:background .4s,transform .3s,box-shadow .3s}
.btn-primary:hover{background:var(--wine-hover);transform:translateY(-2px)}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;background:transparent;color:var(--clay);border:1.5px solid var(--clay);font-family:'Cormorant Garamond',serif;font-weight:400;font-size:.95rem;padding:14px 32px;border-radius:40px;cursor:pointer;transition:all .4s}
.btn-outline:hover{background:var(--clay);color:white}
.hero{min-height:100dvh;display:flex;align-items:center;position:relative;overflow:hidden;padding-top:72px}
.blob{position:absolute;border-radius:60% 40% 55% 45%/45% 55% 40% 60%;pointer-events:none}
.hero-inner{width:100%;max-width:1200px;margin:0 auto;padding:48px 24px;display:grid;grid-template-columns:1fr;gap:48px;align-items:center;position:relative;z-index:2}
.hero-label{font-size:.9rem;font-weight:300;color:var(--mist);letter-spacing:.08em;text-transform:uppercase;margin-bottom:24px}
.hero h1{font-size:clamp(3rem,8vw,6rem);line-height:1;color:var(--ink);margin-bottom:24px}
.hero-exp{font-size:1.1rem;font-weight:300;color:var(--stone);margin-bottom:24px}
.hero-desc{font-size:1.05rem;font-weight:300;color:var(--stone);line-height:1.7;max-width:440px;margin-bottom:32px}
.hero-img-wrap{display:flex;justify-content:center}
.hero-img{width:min(70vw,420px);overflow:hidden;border-radius:40% 60% 55% 45%/55% 45% 60% 40%}
.hero-img img{width:100%;height:auto;object-fit:cover;display:block}
.section{padding:80px 24px}.section-alt{background:var(--warm-white)}
.section-inner{max-width:1080px;margin:0 auto}
.section h2{font-size:clamp(2rem,5vw,3.5rem);text-align:center;color:var(--ink);margin-bottom:12px}
.section-subtitle{font-size:1rem;font-weight:300;color:var(--mist);text-align:center;margin-bottom:48px}
.about-grid{display:grid;grid-template-columns:1fr;gap:48px;align-items:center}
.about-img{width:min(80vw,420px);margin:0 auto;overflow:hidden;border-radius:60% 40% 55% 45%/45% 55% 40% 60%}
.about-img img{width:100%;height:auto;display:block}
.about-text p{font-size:1.05rem;font-weight:300;color:var(--stone);line-height:1.8;margin-bottom:24px}
.services-grid{display:grid;grid-template-columns:1fr;gap:32px}
.service-card{background:var(--parchment);border-radius:32px;padding:40px 32px;transition:transform .5s cubic-bezier(.25,.46,.45,.94),box-shadow .5s}
.service-card:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(45,41,38,.08)}
.service-num{font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--clay-light);opacity:.4;line-height:1;margin-bottom:16px}
.service-card h3{font-size:clamp(1.3rem,3vw,1.8rem);color:var(--ink);margin-bottom:12px}
.service-price{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--clay);margin-bottom:16px}
.service-price span{font-family:'Inter',sans-serif;font-size:.85rem;font-weight:300;color:var(--mist)}
.service-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--clay-light) 50%,transparent);margin-bottom:16px}
.service-card p{font-size:.95rem;font-weight:300;color:var(--stone);line-height:1.7;margin-bottom:12px}
.service-dur{font-size:.85rem;color:var(--mist);margin-bottom:20px}
.testimonials-section{background:var(--parchment)}
.testimonials-grid{display:grid;grid-template-columns:1fr;gap:28px}
.testimonial-card{background:var(--warm-white);border:1px solid var(--parchment);border-radius:28px;padding:32px;transition:transform .4s,box-shadow .4s}
.testimonial-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(45,41,38,.06)}
.testimonial-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.testimonial-avatar{width:56px;height:56px;border-radius:50%;overflow:hidden;border:2px solid var(--clay-light);flex-shrink:0}
.testimonial-avatar img{width:100%;height:100%;object-fit:cover}
.testimonial-name{font-size:.95rem;font-weight:400;color:var(--ink)}.testimonial-role{font-size:.85rem;font-weight:300;color:var(--mist)}
.stars{display:flex;gap:4px;margin-bottom:16px}.star{fill:var(--clay-light);color:var(--clay-light)}
.testimonial-text{font-size:.95rem;font-weight:300;color:var(--stone);line-height:1.7}
.contact-section{background:var(--ivory)}
.contact-form-wrap{background:var(--warm-white);border-radius:32px;padding:40px 32px;max-width:560px;margin:0 auto;box-shadow:0 8px 40px rgba(45,41,38,.04)}
.form-group{margin-bottom:20px}.form-group label{display:block;font-size:.85rem;font-weight:400;color:var(--stone);margin-bottom:8px}
.form-group input,.form-group textarea{width:100%;background:var(--blush);border:1.5px solid transparent;border-radius:16px;padding:16px 20px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:300;color:var(--ink);outline:none;transition:border .3s,box-shadow .3s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--clay);box-shadow:0 0 0 4px rgba(184,123,92,.1)}
.form-group textarea{resize:vertical;min-height:100px}
.contact-info{text-align:center;margin-top:48px}
.contact-info a{display:block;font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--ink);text-decoration:none;margin-bottom:16px;transition:color .3s}
.contact-info a:hover{color:var(--clay)}
.messengers{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:16px}
.messengers a{display:flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:300;color:var(--stone);transition:color .3s}
.messengers a:hover{color:var(--clay)}
.contact-email{font-size:.9rem;font-weight:300;color:var(--mist);text-decoration:none;transition:color .3s}
.contact-email:hover{color:var(--stone)}.contact-loc{font-size:.85rem;font-weight:300;color:var(--mist)}
.footer{background:var(--ink);padding:48px 24px}
.footer-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--clay) 50%,transparent);opacity:.3;margin-bottom:48px}
.footer-inner{max-width:1080px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:24px;text-align:center}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--parchment)}
.footer-sub{font-size:.8rem;font-weight:300;color:var(--mist)}
.footer-nav{display:flex;gap:24px}
.footer-nav a{font-size:.85rem;font-weight:300;color:var(--mist);text-decoration:none;transition:color .3s}
.footer-nav a:hover{color:var(--parchment)}.footer-copy{font-size:.8rem;font-weight:300;color:var(--mist)}
.menu-btn{display:block;background:none;border:none;cursor:pointer;padding:8px}
.menu-overlay{position:fixed;inset:0;background:rgba(247,243,238,.98);backdrop-filter:blur(16px);z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;opacity:0;pointer-events:none;transition:opacity .4s}
.menu-overlay.open{opacity:1;pointer-events:auto}
.menu-overlay a{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--ink);text-decoration:none}
.menu-close{position:absolute;top:20px;right:20px;background:none;border:none;cursor:pointer;font-size:1.5rem;color:var(--ink)}
@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes clipReveal{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0% 0 0)}}
.anim-fade-up{opacity:0}.anim-fade-up.visible{animation:fadeUp 1s cubic-bezier(.25,.46,.45,.94) forwards}
.anim-clip{clip-path:inset(0 100% 0 0)}.anim-clip.visible{animation:clipReveal 1.2s cubic-bezier(.25,.46,.45,.94) forwards}
@media(min-width:768px){
.hero-inner{grid-template-columns:1fr 1fr;gap:64px;padding:0 48px}
.hero-img{width:min(50vw,480px)}.about-grid{grid-template-columns:1fr 1.2fr;gap:64px}
.about-img{margin:0;width:100%;max-width:420px}
.services-grid{grid-template-columns:repeat(3,1fr)}.testimonials-grid{grid-template-columns:repeat(3,1fr)}
.section{padding:120px 48px}.footer-inner{flex-direction:row;justify-content:space-between;text-align:left}
.nav-links{display:flex}.menu-btn{display:none}.header-inner{padding:0 48px}
.contact-form-wrap{padding:48px 40px}}
</style>
</head>
<body>
<header class="header" id="header">
  <div class="header-inner">
    <a href="#" class="logo">Юлия</a>
    <nav class="nav-links">
      <a href="#services">Направления</a>
      <a href="#testimonials">Отзывы</a>
      <a href="#contact">Контакты</a>
    </nav>
    <div style="display:flex;align-items:center;gap:16px">
      <button class="menu-btn" id="menu-btn" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>
</header>
<div class="menu-overlay" id="menu-overlay">
  <button class="menu-close" id="menu-close">&times;</button>
  <a href="#services" class="menu-link">Направления</a>
  <a href="#testimonials" class="menu-link">Отзывы</a>
  <a href="#contact" class="menu-link">Контакты</a>
</div>
<main id="app"></main>
<script>
const FALLBACK_DATA={"hero":{"title":"Юлия","subtitle":"Психолог • Сексолог • Телесно-ориентированный терапевт","experience":"Более 7 лет практики","description":"Помогаю обрести гармонию в отношениях с собой и своим телом. Работаю в тёплом, безопасном формате — без осуждения и давления."},"about":{"title":"Обо мне","paragraphs":["Я верю, что каждый человек имеет право на свою сексуальность — без стыда, страха и чувства вины. Моя задача — создать пространство, где можно свободно говорить о самом сокровенном.","Образование: Московский институт психоанализа, дополнительное обучение в области сексологии и телесно-ориентированной терапии. Регулярно прохожу супервизии и личную терапию — это часть моей профессиональной этики.","Работаю с темами: сексуальная идентичность, дисфункции, травмы, телесные блоки, отношения и близость. Приглашаю вас в бережное путешествие к себе."]},"services":{"title":"Направления работы","subtitle":"Выберите формат, который близок вашему запросу","items":[{"number":"01","title":"Сексология","price":"5 000 ₽","duration":"50 минут","description":"Работа с сексуальной идентичностью, дисфункциями, вопросами ориентации и гендера. Помогаю обрести комфорт в своей сексуальности и построить доверительные отношения с телом."},{"number":"02","title":"Психология","price":"6 000 ₽","duration":"50 минут","description":"Индивидуальная терапия: тревога, депрессия, отношения с собой и другими, самооценка, жизненные кризисы. Интегративный подход с элементами КПТ и гештальта."},{"number":"03","title":"Телесно-ориентированная терапия","price":"8 000 ₽","duration":"80 минут","description":"Работа с телом как с хранилищем эмоций и травм. Освобождение от телесных блоков, восстановление связи с ощущениями, развитие телесной осознанности."}]},"testimonials":{"title":"Отзывы","subtitle":"Что говорят люди после работы со мной","items":[{"name":"Анна","age":"29 лет","role":"сексология","text":"Юлия помогла мне разобраться с годами стыда и непонимания своего тела. Теперь я чувствую свободу, которую раньше даже не могла представить. Это было бережное, тёплое путешествие.","avatar":"avatar-1.jpg","rating":5},{"name":"Марина","age":"35 лет","role":"психология","text":"После развода я потеряла себя. Юлия помогла пройти через боль, не отрицая её, а принимая. Через 6 месяцев я снова чувствую целостность. Благодарю от всего сердца.","avatar":"avatar-2.jpg","rating":5},{"name":"Елена","age":"41 год","role":"телесно-ориентированная терапия","text":"Телесная терапия с Юлией стала откровением. Я наконец-то услышала свое тело, поняла, где живёт моя тревога. Рекомендую всем, кто устал от \"головных\" разговоров.","avatar":"avatar-3.jpg","rating":5}]},"contact":{"title":"Записаться на консультацию","subtitle":"Оставьте заявку — я свяжусь с вами в течение дня, чтобы обсудить детали и назначить встречу","phone":"+7 (999) 123-45-67","whatsapp":"https://wa.me/79991234567","telegram":"https://t.me/julia_psychologist","email":"hello@julia-psychologist.ru","location":"Москва, онлайн по всему миру"}};

let DATA = { ...FALLBACK_DATA };

function render(){
const d = DATA;
const app = document.getElementById('app');
app.innerHTML = renderHero(d.hero) + renderAbout(d.about) + renderServices(d.services) + renderTestimonials(d.testimonials) + renderContact(d.contact) + renderFooter();
initAnimations();
}

function renderHero(h){
return `<section class="hero" style="background:var(--ivory)"><div class="blob" style="top:15%;left:5%;width:280px;height:280px;background:var(--clay-light);opacity:.1"></div><div class="blob" style="bottom:10%;right:8%;width:220px;height:220px;background:var(--sage-light);opacity:.1;border-radius:40% 60% 45% 55%/55% 45% 60% 40%"></div><div class="hero-inner"><div style="order:2"><p class="hero-label anim-fade-up">${escapeHtml(h.subtitle)}</p><h1 class="anim-clip">${escapeHtml(h.title)}</h1><p class="hero-exp anim-fade-up">${escapeHtml(h.experience)}</p><p class="hero-desc anim-fade-up">${escapeHtml(h.description)}</p><a href="#contact" class="btn-primary anim-fade-up">Записаться на консультацию</a></div><div class="hero-img-wrap" style="order:1"><div class="hero-img anim-fade-up"><img src="julia-hero.jpg" alt="Юлия — психолог" /></div></div></div></section>`;
}

function renderAbout(a){
return `<section class="section section-alt"><div class="section-inner"><h2 class="anim-clip">${escapeHtml(a.title)}</h2><div class="about-grid" style="margin-top:64px"><div class="about-img anim-fade-up"><img src="julia-about.jpg" alt="Юлия в кабинете" /></div><div class="about-text">${a.paragraphs.map((p,i)=>`<p class="anim-fade-up" style="animation-delay:${i*.15}s">${escapeHtml(p)}</p>`).join('')}</div></div></div></section>`;
}

function renderServices(s){
return `<section class="section" id="services" style="background:var(--ivory)"><div class="section-inner"><h2 class="anim-clip">${escapeHtml(s.title)}</h2><p class="section-subtitle anim-fade-up">${escapeHtml(s.subtitle)}</p><div class="services-grid" style="margin-top:48px">${s.items.map((svc,i)=>`<div class="service-card anim-fade-up" style="animation-delay:${i*.2}s"><span class="service-num">${escapeHtml(svc.number)}</span><h3>${escapeHtml(svc.title)}</h3><p class="service-price">${escapeHtml(svc.price)} <span>/ сессия</span></p><div class="service-divider"></div><p>${escapeHtml(svc.description)}</p><p class="service-dur">${escapeHtml(svc.duration)}</p><a href="#contact" class="btn-outline" style="width:100%;font-size:.9rem;padding:12px 24px">Записаться</a></div>`).join('')}</div></div></section>`;
}

function renderTestimonials(t){
return `<section class="section testimonials-section" id="testimonials"><div class="section-inner"><h2 class="anim-clip">${escapeHtml(t.title)}</h2><p class="section-subtitle anim-fade-up">${escapeHtml(t.subtitle)}</p><div class="testimonials-grid" style="margin-top:48px">${t.items.map((item,i)=>`<div class="testimonial-card anim-fade-up" style="animation-delay:${i*.15}s"><div class="testimonial-header"><div class="testimonial-avatar"><img src="${escapeHtml(item.avatar)}" alt="${escapeHtml(item.name)}" /></div><div><p class="testimonial-name">${escapeHtml(item.name)}${item.age?', '+escapeHtml(item.age):''}</p><p class="testimonial-role">${escapeHtml(item.role)}</p></div></div><div class="stars">${Array(item.rating).fill('<svg class="star" width="14" height="14" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>').join('')}</div><p class="testimonial-text">${escapeHtml(item.text)}</p></div>`).join('')}</div></div></section>`;
}

function renderContact(c){
return `<section class="section contact-section" id="contact"><div class="section-inner"><h2 class="anim-clip">${escapeHtml(c.title)}</h2><p class="section-subtitle anim-fade-up">${escapeHtml(c.subtitle)}</p><div class="contact-form-wrap anim-fade-up"><form id="contact-form"><div class="form-group"><label>Ваше имя</label><input type="text" placeholder="Как к вам обращаться" required /></div><div class="form-group"><label>Телефон или Telegram</label><input type="text" placeholder="+7 (___) ___-__-__" required /></div><div class="form-group"><label>О чём хотели бы поговорить?</label><textarea rows="4" placeholder="Кратко опишите ваш запрос..."></textarea></div><button type="submit" class="btn-primary" style="width:100%">Отправить заявку</button></form></div><div class="contact-info"><a href="tel:${c.phone.replace(/\s/g,'')}">${escapeHtml(c.phone)}</a><div class="messengers"><a href="${escapeHtml(c.whatsapp)}" target="_blank" rel="noopener"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>WhatsApp</a><a href="${escapeHtml(c.telegram)}" target="_blank" rel="noopener"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9 22,2"/></svg>Telegram</a></div><a href="mailto:${c.email}" class="contact-email">${escapeHtml(c.email)}</a><p class="contact-loc">${escapeHtml(c.location)}</p></div></div></section>`;
}

function renderFooter(){
return `<footer class="footer"><div class="footer-divider"></div><div class="footer-inner"><div><p class="footer-logo">Юлия</p><p class="footer-sub">Психолог • Сексолог</p></div><nav class="footer-nav"><a href="#services">Направления</a><a href="#testimonials">Отзывы</a><a href="#contact">Контакты</a></nav><p class="footer-copy">© 2025</p></div></footer>`;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
    return c;
  });
}

function initAnimations(){
const observer=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:.1,rootMargin:'0px 0px -50px 0px'});
document.querySelectorAll('.anim-fade-up,.anim-clip').forEach(el=>observer.observe(el));
const header=document.getElementById('header');
window.addEventListener('scroll',()=>{if(window.scrollY>50)header.classList.add('scrolled');else header.classList.remove('scrolled')},{passive:true});
const menuBtn=document.getElementById('menu-btn'),menuOverlay=document.getElementById('menu-overlay'),menuClose=document.getElementById('menu-close');
if(menuBtn && menuOverlay && menuClose) {
  menuBtn.addEventListener('click',()=>menuOverlay.classList.add('open'));
  menuClose.addEventListener('click',()=>menuOverlay.classList.remove('open'));
  document.querySelectorAll('.menu-link').forEach(l=>l.addEventListener('click',()=>menuOverlay.classList.remove('open')));
}
document.querySelectorAll('a[href^="#"]').forEach(a=>{a.addEventListener('click',e=>{const id=a.getAttribute('href');if(id==='#'||!id)return;e.preventDefault();const target=document.querySelector(id);if(target)target.scrollIntoView({behavior:'smooth'})})});
const form=document.getElementById('contact-form');
if(form) form.addEventListener('submit',e=>{e.preventDefault();form.innerHTML='<p style="text-align:center;padding:20px"><strong style="font-family:Cormorant Garamond,serif;font-size:1.5rem;color:var(--ink)">Спасибо!</strong><br><span style="color:var(--stone)">Я получила вашу заявку и свяжусь с вами.</span></p>'});
}

// Загружаем data.json
fetch('data.json')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(json => { DATA = json; render(); })
  .catch(() => { DATA = FALLBACK_DATA; render(); });
</script>
</body>
</html>
