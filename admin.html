<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Админ-панель — Юлия</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{--ivory:#F7F3EE;--clay:#B87B5C;--clay-light:#D4A88C;--terracotta:#C4705A;--sage:#7A8B73;--ink:#2D2926;--stone:#6B6560;--mist:#9B9590;--parchment:#EDE8E1;--warm-white:#FAF8F5;--blush:#E8D5C4;--wine:#722F37;--wine-hover:#8B3A44;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--ivory);color:var(--ink);min-height:100vh}
h1,h2,h3{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400}

/* Login */
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--ivory);display:flex;align-items:center;justify-content:center;z-index:9999}
#login-screen.hidden{display:none}
.login-box{background:var(--warm-white);border:1px solid var(--parchment);border-radius:32px;padding:48px 40px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(45,41,38,.08);text-align:center}
.login-box h2{font-size:2rem;margin-bottom:8px}
.login-box>p{color:var(--mist);font-size:.9rem;margin-bottom:32px}
.login-box .field{margin-bottom:20px;text-align:left}
.login-box input{width:100%;background:var(--blush);border:1.5px solid transparent;border-radius:16px;padding:16px 20px;font-family:'Inter',sans-serif;font-size:1rem;color:var(--ink);outline:none;transition:border .3s,box-shadow .3s}
.login-box input:focus{border-color:var(--clay);box-shadow:0 0 0 4px rgba(184,123,92,.1)}
#login-error{color:var(--terracotta);font-size:.85rem;margin-top:12px;display:none}
#login-error.show{display:block}

/* Header */
.header{background:var(--warm-white);border-bottom:1px solid var(--parchment);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header h1{font-size:1.5rem;color:var(--ink)}
.header-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:40px;border:none;font-family:'Cormorant Garamond',serif;font-size:.95rem;cursor:pointer;text-decoration:none;transition:all .3s}
.btn-primary{background:var(--wine);color:white}.btn-primary:hover{background:var(--wine-hover);transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--clay);border:1.5px solid var(--clay)}.btn-secondary:hover{background:var(--clay);color:white}
.btn-success{background:var(--sage);color:white}

/* Tabs */
.tabs{display:flex;gap:4px;padding:24px 24px 0;background:var(--warm-white);border-bottom:1px solid var(--parchment);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:12px 24px;border:none;background:none;font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--mist);cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;white-space:nowrap}
.tab.active{color:var(--ink);border-bottom-color:var(--clay)}.tab:hover{color:var(--stone)}

/* Content */
.container{max-width:900px;margin:0 auto;padding:32px 24px}
.panel{display:none}.panel.active{display:block}

/* Cards */
.card{background:var(--warm-white);border:1px solid var(--parchment);border-radius:24px;padding:28px;margin-bottom:20px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--ink);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--parchment)}

/* Form */
.field{margin-bottom:16px}.field:last-child{margin-bottom:0}
.field-label{display:block;font-size:.85rem;font-weight:400;color:var(--stone);margin-bottom:6px}
.field input,.field textarea{width:100%;background:var(--blush);border:1.5px solid transparent;border-radius:14px;padding:14px 18px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:300;color:var(--ink);outline:none;transition:border .3s,box-shadow .3s}
.field input:focus,.field textarea:focus{border-color:var(--clay);box-shadow:0 0 0 4px rgba(184,123,92,.1)}
.field textarea{resize:vertical;min-height:80px}
.row{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:768px){.row{grid-template-columns:1fr 1fr}.row-3{grid-template-columns:1fr 1fr 1fr}}

.section-title{font-family:'Cormorant Garamond',serif;font-size:1.75rem;color:var(--ink);margin:32px 0 20px}

/* Stars */
.stars{display:flex;gap:4px;margin-top:8px}
.star-btn{background:none;border:none;cursor:pointer;padding:2px;transition:transform .2s}.star-btn:hover{transform:scale(1.2)}
.star-btn svg{fill:var(--mist);color:var(--mist);transition:fill .2s;width:20px;height:20px}
.star-btn.active svg{fill:var(--clay-light);color:var(--clay-light)}

/* Info */
.info-box{background:var(--blush);border-radius:16px;padding:20px 24px;margin-bottom:32px}
.info-box p{font-size:.9rem;color:var(--stone);line-height:1.6}.info-box strong{color:var(--ink)}
.info-box code{background:var(--warm-white);padding:2px 8px;border-radius:4px;font-size:.85rem;color:var(--wine)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--sage);color:white;padding:12px 28px;border-radius:40px;font-size:.9rem;opacity:0;transition:all .4s cubic-bezier(.25,.46,.45,.94);z-index:100}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:767px){.header{flex-wrap:wrap;gap:12px}.header h1{font-size:1.25rem}.tabs{padding:16px 16px 0}.container{padding:20px 16px}.card{padding:20px}.login-box{padding:32px 24px}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h2>Панель управления</h2>
    <p>Введите пароль для входа</p>
    <div class="field">
      <input type="password" id="login-password" placeholder="Пароль" onkeydown="if(event.key==='Enter')checkPassword()" />
    </div>
    <button class="btn btn-primary" onclick="checkPassword()" style="width:100%;justify-content:center">Войти</button>
    <p id="login-error">Неверный пароль</p>
  </div>
</div>

<!-- ADMIN CONTENT (hidden until login) -->
<div id="admin-content" style="display:none">

<header class="header">
  <h1>Панель управления</h1>
  <div class="header-actions">
    <button class="btn btn-success" onclick="downloadJSON()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Скачать JSON
    </button>
    <button class="btn btn-secondary" onclick="logout()">Выйти</button>
    <a href="index.html" class="btn btn-secondary">На сайт</a>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="hero">Главный экран</button>
  <button class="tab" data-tab="about">Обо мне</button>
  <button class="tab" data-tab="services">Услуги</button>
  <button class="tab" data-tab="testimonials">Отзывы</button>
  <button class="tab" data-tab="contact">Контакты</button>
</nav>

<div class="container">

  <div class="info-box">
    <p><strong>Как редактировать:</strong> измените текст в полях ниже → нажмите <strong>«Скачать JSON»</strong> → загрузите файл <code>data.json</code> в свой репозиторий на GitHub. Изменения появятся на сайте через 1–2 минуты.</p>
  </div>

  <!-- Hero -->
  <div class="panel active" id="panel-hero">
    <div class="card">
      <div class="field"><label class="field-label">Имя (Hero)</label><input type="text" id="hero-title" /></div>
      <div class="field"><label class="field-label">Подзаголовок</label><input type="text" id="hero-subtitle" /></div>
      <div class="field"><label class="field-label">Опыт</label><input type="text" id="hero-experience" /></div>
      <div class="field"><label class="field-label">Описание</label><textarea id="hero-description" rows="3"></textarea></div>
    </div>
  </div>

  <!-- About -->
  <div class="panel" id="panel-about">
    <div class="card">
      <div class="field"><label class="field-label">Заголовок секции</label><input type="text" id="about-title" /></div>
    </div>
    <h3 class="section-title">Абзацы</h3>
    <div id="about-paragraphs"></div>
  </div>

  <!-- Services -->
  <div class="panel" id="panel-services">
    <div class="card">
      <div class="field"><label class="field-label">Заголовок секции</label><input type="text" id="services-title" /></div>
      <div class="field"><label class="field-label">Подзаголовок</label><input type="text" id="services-subtitle" /></div>
    </div>
    <div id="services-list"></div>
  </div>

  <!-- Testimonials -->
  <div class="panel" id="panel-testimonials">
    <div class="card">
      <div class="field"><label class="field-label">Заголовок секции</label><input type="text" id="testimonials-title" /></div>
      <div class="field"><label class="field-label">Подзаголовок</label><input type="text" id="testimonials-subtitle" /></div>
    </div>
    <div id="testimonials-list"></div>
  </div>

  <!-- Contact -->
  <div class="panel" id="panel-contact">
    <div class="card">
      <div class="field"><label class="field-label">Заголовок секции</label><input type="text" id="contact-title" /></div>
      <div class="field"><label class="field-label">Подзаголовок</label><textarea id="contact-subtitle" rows="2"></textarea></div>
      <div class="row">
        <div class="field"><label class="field-label">Телефон</label><input type="text" id="contact-phone" /></div>
        <div class="field"><label class="field-label">Email</label><input type="text" id="contact-email" /></div>
      </div>
      <div class="row">
        <div class="field"><label class="field-label">WhatsApp ссылка</label><input type="text" id="contact-whatsapp" /></div>
        <div class="field"><label class="field-label">Telegram ссылка</label><input type="text" id="contact-telegram" /></div>
      </div>
      <div class="field"><label class="field-label">Локация</label><input type="text" id="contact-location" /></div>
    </div>
  </div>

</div>
</div>

<div class="toast" id="toast">JSON скачан!</div>

<script>
// ========== PASSWORD ==========
const ADMIN_PASSWORD = "julia2025";

function checkPassword() {
  const input = document.getElementById('login-password').value;
  if (input === ADMIN_PASSWORD) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-content').style.display = 'block';
    localStorage.setItem('julia_admin', '1');
  } else {
    document.getElementById('login-error').classList.add('show');
    document.getElementById('login-password').value = '';
  }
}

function logout() {
  localStorage.removeItem('julia_admin');
  location.reload();
}

// Auto-login
if (localStorage.getItem('julia_admin') === '1') {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-content').style.display = 'block';
}

// ========== DATA ==========
const DEFAULT_DATA = {"hero":{"title":"Юлия","subtitle":"Психолог • Сексолог • Телесно-ориентированный терапевт","experience":"Более 7 лет практики","description":"Помогаю обрести гармонию в отношениях с собой и своим телом. Работаю в тёплом, безопасном формате — без осуждения и давления."},"about":{"title":"Обо мне","paragraphs":["Я верю, что каждый человек имеет право на свою сексуальность — без стыда, страха и чувства вины. Моя задача — создать пространство, где можно свободно говорить о самом сокровенном.","Образование: Московский институт психоанализа, дополнительное обучение в области сексологии и телесно-ориентированной терапии. Регулярно прохожу супервизии и личную терапию — это часть моей профессиональной этики.","Работаю с темами: сексуальная идентичность, дисфункции, травмы, телесные блоки, отношения и близость. Приглашаю вас в бережное путешествие к себе."]},"services":{"title":"Направления работы","subtitle":"Выберите формат, который близок вашему запросу","items":[{"number":"01","title":"Сексология","price":"5 000 ₽","duration":"50 минут","description":"Работа с сексуальной идентичностью, дисфункциями, вопросами ориентации и гендера. Помогаю обрести комфорт в своей сексуальности и построить доверительные отношения с телом."},{"number":"02","title":"Психология","price":"6 000 ₽","duration":"50 минут","description":"Индивидуальная терапия: тревога, депрессия, отношения с собой и другими, самооценка, жизненные кризисы. Интегративный подход с элементами КПТ и гештальта."},{"number":"03","title":"Телесно-ориентированная терапия","price":"8 000 ₽","duration":"80 минут","description":"Работа с телом как с хранилищем эмоций и травм. Освобождение от телесных блоков, восстановление связи с ощущениями, развитие телесной осознанности."}]},"testimonials":{"title":"Отзывы","subtitle":"Что говорят люди после работы со мной","items":[{"name":"Анна","age":"29 лет","role":"сексология","text":"Юлия помогла мне разобраться с годами стыда и непонимания своего тела. Теперь я чувствую свободу, которую раньше даже не могла представить. Это было бережное, тёплое путешествие.","avatar":"avatar-1.jpg","rating":5},{"name":"Марина","age":"35 лет","role":"психология","text":"После развода я потеряла себя. Юлия помогла пройти через боль, не отрицая её, а принимая. Через 6 месяцев я снова чувствую целостность. Благодарю от всего сердца.","avatar":"avatar-2.jpg","rating":5},{"name":"Елена","age":"41 год","role":"телесно-ориентированная терапия","text":"Телесная терапия с Юлией стала откровением. Я наконец-то услышала свое тело, поняла, где живёт моя тревога. Рекомендую всем, кто устал от \"головных\" разговоров.","avatar":"avatar-3.jpg","rating":5}]},"contact":{"title":"Записаться на консультацию","subtitle":"Оставьте заявку — я свяжусь с вами в течение дня, чтобы обсудить детали и назначить встречу","phone":"+7 (999) 123-45-67","whatsapp":"https://wa.me/79991234567","telegram":"https://t.me/julia_psychologist","email":"hello@julia-psychologist.ru","location":"Москва, онлайн по всему миру"}};

let data = {};

fetch('data.json')
  .then(r => r.ok ? r.json() : Promise.reject())
  .then(d => { data = d; populate(); })
  .catch(() => { data = DEFAULT_DATA; populate(); });

function populate() {
  document.getElementById('hero-title').value = data.hero.title;
  document.getElementById('hero-subtitle').value = data.hero.subtitle;
  document.getElementById('hero-experience').value = data.hero.experience;
  document.getElementById('hero-description').value = data.hero.description;

  document.getElementById('about-title').value = data.about.title;
  document.getElementById('about-paragraphs').innerHTML = data.about.paragraphs.map((p, i) => `
    <div class="card"><div class="field"><label class="field-label">Абзац ${i + 1}</label><textarea class="about-p" data-index="${i}" rows="4">${p}</textarea></div></div>`).join('');

  document.getElementById('services-title').value = data.services.title;
  document.getElementById('services-subtitle').value = data.services.subtitle;
  document.getElementById('services-list').innerHTML = data.services.items.map((s, i) => `
    <div class="card">
      <h3 class="card-title">Услуга ${i + 1}: ${s.title}</h3>
      <div class="row row-3">
        <div class="field"><label class="field-label">Номер</label><input type="text" class="svc-num" data-index="${i}" value="${s.number}" /></div>
        <div class="field"><label class="field-label">Название</label><input type="text" class="svc-title" data-index="${i}" value="${s.title}" /></div>
        <div class="field"><label class="field-label">Цена</label><input type="text" class="svc-price" data-index="${i}" value="${s.price}" /></div>
      </div>
      <div class="row">
        <div class="field"><label class="field-label">Длительность</label><input type="text" class="svc-dur" data-index="${i}" value="${s.duration}" /></div>
        <div class="field" style="grid-column:1/-1"><label class="field-label">Описание</label><textarea class="svc-desc" data-index="${i}" rows="3">${s.description}</textarea></div>
      </div>
    </div>`).join('');

  document.getElementById('testimonials-title').value = data.testimonials.title;
  document.getElementById('testimonials-subtitle').value = data.testimonials.subtitle;
  document.getElementById('testimonials-list').innerHTML = data.testimonials.items.map((t, i) => `
    <div class="card">
      <h3 class="card-title">Отзыв ${i + 1}: ${t.name}</h3>
      <div class="row row-3">
        <div class="field"><label class="field-label">Имя</label><input type="text" class="t-name" data-index="${i}" value="${t.name}" /></div>
        <div class="field"><label class="field-label">Возраст</label><input type="text" class="t-age" data-index="${i}" value="${t.age}" /></div>
        <div class="field"><label class="field-label">Направление</label><input type="text" class="t-role" data-index="${i}" value="${t.role}" /></div>
      </div>
      <div class="field"><label class="field-label">Текст отзыва</label><textarea class="t-text" data-index="${i}" rows="4">${t.text}</textarea></div>
      <div class="row">
        <div class="field"><label class="field-label">Аватар (имя файла)</label><input type="text" class="t-avatar" data-index="${i}" value="${t.avatar}" /></div>
        <div class="field"><label class="field-label">Рейтинг</label><div class="stars">${[1,2,3,4,5].map(star => `<button class="star-btn ${star <= t.rating ? 'active' : ''}" onclick="setStar(${i},${star})"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></button>`).join('')}</div></div>
      </div>
    </div>`).join('');

  document.getElementById('contact-title').value = data.contact.title;
  document.getElementById('contact-subtitle').value = data.contact.subtitle;
  document.getElementById('contact-phone').value = data.contact.phone;
  document.getElementById('contact-email').value = data.contact.email;
  document.getElementById('contact-whatsapp').value = data.contact.whatsapp;
  document.getElementById('contact-telegram').value = data.contact.telegram;
  document.getElementById('contact-location').value = data.contact.location;
}

function setStar(index, rating) {
  data.testimonials.items[index].rating = rating;
  const cards = document.querySelectorAll('#testimonials-list .card');
  if (cards[index]) {
    cards[index].querySelectorAll('.star-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i < rating);
    });
  }
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// Collect & Download
function downloadJSON() {
  data.hero.title = document.getElementById('hero-title').value;
  data.hero.subtitle = document.getElementById('hero-subtitle').value;
  data.hero.experience = document.getElementById('hero-experience').value;
  data.hero.description = document.getElementById('hero-description').value;
  data.about.title = document.getElementById('about-title').value;
  document.querySelectorAll('.about-p').forEach(el => { data.about.paragraphs[parseInt(el.dataset.index)] = el.value; });
  data.services.title = document.getElementById('services-title').value;
  data.services.subtitle = document.getElementById('services-subtitle').value;
  document.querySelectorAll('#services-list .card').forEach((card, i) => {
    data.services.items[i].number = card.querySelector('.svc-num').value;
    data.services.items[i].title = card.querySelector('.svc-title').value;
    data.services.items[i].price = card.querySelector('.svc-price').value;
    data.services.items[i].duration = card.querySelector('.svc-dur').value;
    data.services.items[i].description = card.querySelector('.svc-de
